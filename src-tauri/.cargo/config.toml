# MSVC toolchain + BtbN FFmpeg n8.1 (MSVC-compatible .lib files)
# Requires:
#   C:\Users\<you>\ffmpeg81\ffmpeg-n8.1-latest-win64-lgpl-shared-8.1\  (from BtbN)
#   C:\Program Files\LLVM\bin\libclang.dll  (official LLVM)
#
# These env vars are set here so `cargo build` works without extra shell setup.

[env]
FFMPEG_DIR   = "C:\\Users\\20020\\ffmpeg81\\ffmpeg-n8.1-latest-win64-lgpl-shared-8.1"
LIBCLANG_PATH = "C:\\Program Files\\LLVM\\bin"
BINDGEN_EXTRA_CLANG_ARGS = "-target x86_64-pc-windows-msvc -nostdinc -isystem \"C:\\Program Files\\Microsoft Visual Studio\\2022\\Community\\VC\\Tools\\MSVC\\14.44.35207\\include\" -isystem \"C:\\Program Files (x86)\\Windows Kits\\10\\Include\\10.0.26100.0\\ucrt\" -isystem \"C:\\Program Files (x86)\\Windows Kits\\10\\Include\\10.0.26100.0\\shared\" -isystem \"C:\\Program Files (x86)\\Windows Kits\\10\\Include\\10.0.26100.0\\um\""

